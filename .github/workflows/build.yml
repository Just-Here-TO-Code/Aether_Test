name: CMake Build
on:
  pull_request:
    branches: [main,dev]
  push:
    branches: [main,dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build
      